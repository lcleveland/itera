# carapace completion spec for the `itera` command (see dev/itera.sh).
#
# carapace is itera's external completer in nushell (see
# modules/nixos/core/shell/nushell.nix + modules/hjem/programs/nushell.nix). It
# auto-loads specs from ~/.config/carapace/specs/; the test hosts drop this file
# there for the login user via dev/remote-access.nix, so `itera <TAB>` completes.
# carapace serves the same spec to bash/zsh/fish too, so dropping it into your own
# ~/.config/carapace/specs/ gives `nix run .#itera` completion in any shell.
#
# Keep this in sync with dev/itera.sh: a new subcommand needs a `case` arm there
# AND an entry here.
name: itera
description: itera's tooling, under one command
commands:
  - name: facter
    description: hardware reporting
    commands:
      - name: report
        description: generate a nixos-facter report + itera.* tuning summary
        completion:
          positional:
            - ["$files"]
  - name: testhost
    description: itera-testhost lifecycle
    commands:
      - name: rebuild
        description: rebuild this host in place (nh os switch)
      - name: install
        description: install itera-testhost onto a disk (disko-install)
  - name: help
    description: show usage
