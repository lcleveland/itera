name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        system: [x86_64-linux, aarch64-linux]
    runs-on: ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      # x86_64 runners ship /dev/kvm but not accessible by default; this udev
      # rule opens it so the Nix installer picks up the `kvm` system feature.
      # Skipped on aarch64 runners, which have no KVM device at all (the
      # udevadm trigger would fail) — VM tests are gated to x86_64 in
      # flake/checks.nix.
      - name: Enable KVM
        if: matrix.system == 'x86_64-linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          # Match itera's own `itera.nix.cache` defaults so CI pulls the same
          # prebuilt closures a consumer system would (the module only affects
          # built systems, not `nix flake check`, so configure the daemon here).
          # NOTE: keep this substituter + key in sync with the canonical defaults
          # in modules/nixos/core/cache.nix.
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

      # Persist /nix across runs so itera's own eval closures don't rebuild every
      # time. Replaces DeterminateSystems/magic-nix-cache (wound down early 2025).
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ matrix.system }}-${{ hashFiles('flake.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ matrix.system }}-
          # Keep the GitHub Actions cache bounded.
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ matrix.system }}-
          purge-created: 0
          purge-primary-key: never

      # Runs everything: treefmt `formatting`, git-hooks `pre-commit`, and the
      # itera module tests for this system.
      - name: Flake check
        run: nix flake check --print-build-logs --system ${{ matrix.system }}
