name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        system: [x86_64-linux, aarch64-linux]
    runs-on: ${{ matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      # x86_64 runners ship /dev/kvm but not accessible by default; this udev
      # rule opens it so the Nix installer picks up the `kvm` system feature.
      # No-op on aarch64 runners, which have no KVM at all (the rule matches
      # nothing) — VM tests are gated to x86_64 in flake/checks.nix.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up binary cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # Runs everything: treefmt `formatting`, git-hooks `pre-commit`, and the
      # itera module tests for this system.
      - name: Flake check
        run: nix flake check --print-build-logs --system ${{ matrix.system }}
